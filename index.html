<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Natureza</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <input type="text" name="nbusca" id="busca" placeholder="Busque por Florestas" autocomplete="text">
        <h1>EXPLORE A NATUREZA</h1>
    </header>
    <main>
        <section>
            <div id="conteudo">
                <div class="filho-conteudo">
                    <img src="img/paul-summers-ArtVJ-217Cw-unsplash.jpg" alt="Paisagem" class="imgconteudo">
                    <div class="espaco">
                        <p>Florestas</p>
                        <img src="img/tree-solid-full.svg" alt="Árvore" class="icones">
                    </div>
                </div>
                <div class="filho-conteudo">
                    <img src="img/sergei-a--heLWtuAN3c-unsplash.jpg" alt="Paisagem" class="imgconteudo">
                    <div class="espaco">
                        <p>Paisagens</p>
                        <img src="img/camera-solid-full.svg" alt="Paisagens" class="icones">
                    </div>
                </div>
                <div class="filho-conteudo">
                    <img src="img/m1.jpg" alt="Paisagem" class="imgconteudo">
                    <div class="espaco">
                        <p>Internacional</p>
                        <img src="img/earth-africa-solid-full.svg" alt="Paisagens" class="icones">
                    </div>
                </div>
                <div class="filho-conteudo">
                    <img src="img/m2.jpg" alt="Paisagem" class="imgconteudo">
                    <div class="espaco">
                        <p>Agradável</p>
                        <img src="img/face-grin-regular-full.svg" alt="Paisagens" class="icones">
                    </div>
                </div>

            </div>
        </section>
        <footer>
            <div id="rodape">
                <h2>Saiba Mais</h2>
                <p>Sobre a empresa</p>
                <p></p>
            </div>
        </footer>
    </main>
</body>
</html>
